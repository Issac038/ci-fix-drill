name: CI Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Changed npm install → npm ci for reproducible installs
      - name: Install dependencies
        run: npm ci

  test:
    needs: install     # test waits for install job

    runs-on: ubuntu-latest

    steps:
      # Each job gets fresh machine, so checkout again
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Need dependencies again because jobs are isolated
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test